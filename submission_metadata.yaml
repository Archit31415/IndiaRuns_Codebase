ai_usage_summary: |
  Briefly describe how AI tools were used. Examples:
  - "Used Gemini for code review and architectural discussion.
     No candidate data was fed to any LLM."

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  ≤200 word summary of your approach. Strongly recommended.

  "To process 100,000 candidates under a strict 15-second CPU constraint, our system decouples heavy 
  calculations into an Offline Preparation Layer and an Online Ranker Engine. During the offline phase, 
  raw text profiles are converted into chronological work histories, a local transformer model vectorizes 
  these profiles into a 150MB dense semantic matrix, and baseline behavioral signals are saved as localized 
  JSON parameters. When the online pipeline runs, Stage 0 instantly purges invalid records and 
  keyword-stuffed honeypots, while a C-optimized spaCy extraction pass flags structural text matches to 
  truncate the pool. Next, the engine executes rapid matrix dot products over the precomputed embedding 
  array to isolate deep semantic alignment without memory bloat, before normalising multi-axis scores and 
  applying deterministic tie-breakers (like career longevity and profile stability coefficients) to output 
  the elite, top-100 ranked spreadsheet instantly. By physically separating feature generation from 
  execution-stage scoring loops, the system completely eliminates runtime network dependencies and 
  cold-start container latencies, running safely inside isolated offline environments."

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
